version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_HOST=db
      - DB_DATABASE=syncoffice
      - DB_USERNAME=syncoffice
      - DB_PASSWORD=secret
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: syncoffice
      MYSQL_USER: syncoffice
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: syncoffice
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  dbdata:

# Usage:
#   docker-compose up -d
#   docker-compose exec app php artisan app:install
#   Open http://localhost:8080/login
#   phpMyAdmin: http://localhost:8081
